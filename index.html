<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pokémon Infinite Safari</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; }
        #pokedex-card { border: 2px solid #ff0000; padding: 20px; width: 300px; margin: auto; }
        img { width: 150px; height: 150px; image-rendering: pixelated; }
        button { padding: 10px 20px; cursor: pointer; background: #ff0000; border: none; color: white; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Pokémon Infinite Safari 🔴</h1>
    <div id="pokedex-card">
        <img id="poke-img" src="" alt="Pokémon">
        <h2 id="poke-name">Loading...</h2>
        <p>HP: <span id="poke-hp">0</span></p>
        <button onclick="fetchRandomPokemon()">Find New Pokemon!</button>
    </div>

<script>
    async function fetchRandomPokemon() {
        const id = Math.floor(Math.random() * 1025) + 1;
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
        const data = await res.json();

        // Update UI
        document.getElementById('poke-name').innerText = data.name.toUpperCase();
        document.getElementById('poke-img').src = data.sprites.front_default;
        document.getElementById('poke-hp').innerText = data.stats[0].base_stat;
    }

    // Load first one
    fetchRandomPokemon();
</script>
</body>
</html>
